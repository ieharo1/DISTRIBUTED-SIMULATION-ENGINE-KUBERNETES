apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulation-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: simulation-worker
  template:
    metadata:
      labels:
        app: simulation-worker
    spec:
      containers:
        - name: worker
          image: simulation-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_HOST
              value: redis

